[principles]
# 风险监控底线原则 - 2026-03-16 确立
absolute_rules = [
    "禁止使用模拟数据 - 任何情况下都不允许使用demo_mode或模拟生成的数据",
    "禁止使用过时的数据 - 新闻和市场数据必须是当日的，不能是几天前的"
]

