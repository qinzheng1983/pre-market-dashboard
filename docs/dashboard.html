<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财资报告导航页</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background: #f5f6fa; color: #1a1a2e; }
  .container { max-width: 960px; margin: 0 auto; padding: 40px 20px; }
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { margin: 0; font-size: 26px; }
  .header p { margin: 8px 0 0; color: #666; font-size: 14px; }
  .grid { display: table; width: 100%; border-spacing: 20px; }
  .card { display: table-cell; width: 33%; background: #fff; border-radius: 8px; padding: 24px; border-left: 4px solid #e94560; box-shadow: 0 2px 8px rgba(0,0,0,0.06); vertical-align: top; }
  .card h2 { margin: 0 0 10px; font-size: 18px; }
  .card p { margin: 0 0 16px; font-size: 13px; color: #555; line-height: 1.6; }
  .card a { display: inline-block; padding: 8px 16px; background: #1a1a2e; color: #fff; text-decoration: none; border-radius: 4px; font-size: 13px; }
  .card a:hover { background: #e94560; }
  .meta { font-size: 12px; color: #888; margin-top: 12px; }
  @media (max-width: 720px) {
    .grid { display: block; }
    .card { display: block; width: auto; margin-bottom: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>财资报告导航页</h1>
    <p>最新一期报告快速入口 | 历史报告请通过直接 URL 访问</p>
  </div>
  <div class="grid">
    <div class="card">
      <h2>盘前简报</h2>
      <p>每日 08:30 发布，覆盖 overnight 全球市场动态，开盘前行动清单。</p>
      <a href="index.html">查看最新简报</a>
      <div class="meta">最新：2026-06-05</div>
    </div>
    <div class="card">
      <h2>财资日报</h2>
      <p>每日 16:00 发布，当日完整收盘数据，货币政策、汇率、有色、贵金属、地缘。</p>
      <a href="finance-daily/20260424.html">查看最新日报</a>
      <div class="meta">最新：2026-04-24</div>
    </div>
    <div class="card">
      <h2>财资周报</h2>
      <p>每周五 16:00 发布，周一至周五数据汇总，周度洞察 + 下周前瞻。</p>
      <a href="finance-weekly/2026w23.html">查看最新周报</a>
      <div class="meta">最新：2026年第23周</div>
    </div>
  </div>
</div>

</html>
