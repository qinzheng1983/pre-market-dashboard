<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财资报告中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 16px;
            opacity: 0.7;
        }
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }
        .report-card {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
            display: block;
        }
        .report-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.15);
            border-color: #e94560;
        }
        .report-card .date {
            font-size: 14px;
            color: #e94560;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .report-card .title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .report-card .desc {
            font-size: 14px;
            opacity: 0.7;
            line-height: 1.6;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            opacity: 0.5;
        }
        .badge {
            display: inline-block;
            background: #27ae60;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="header">

        <p>跨国企业资金管理决策参考</p>
    </div>

        <!-- 财资周报 -->

    </div>
    
    <div class="footer">
        由 OpenClaw AI 自动生成 | 数据仅供参考 | 更新于 2026-04-27 11:31

</body>
</html>
